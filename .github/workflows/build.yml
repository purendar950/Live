name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: UP-Quiz-Live-APK
        path: app/build/outputs/apk/release/app-release.apk

    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/heads/main')
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: UP Quiz Live v1.0.${{ github.run_number }}
        files: app/build/outputs/apk/release/app-release.apk
        generate_release_notes: false
        body: |
          ## UP Quiz Live APK 🎯
          
          **UTTAR PRADESH LEKHPAL** YouTube Channel के लिए
          
          ### Install करो:
          1. APK Download करो
          2. Install करो (Unknown sources allow करो)
          3. "Display over other apps" permission दो
          4. नाम डालो → Join करो
          5. YouTube खोलो — Quiz Card आएगा!
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
